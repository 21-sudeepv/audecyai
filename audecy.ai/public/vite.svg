<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" width="400" height="540">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b07a"/>
      <stop offset="50%" style="stop-color:#b8965a"/>
      <stop offset="100%" style="stop-color:#8a6e3a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b07a"/>
      <stop offset="100%" style="stop-color:#b8965a"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a060"/>
      <stop offset="100%" style="stop-color:#8a6e3a"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&amp;display=swap');
    </style>
  </defs>

  <!-- ===================== -->
  <!-- PANEL 1: PRIMARY DARK -->
  <!-- ===================== -->
  <rect x="0" y="0" width="400" height="170" fill="#0a0a0a" rx="4"/>

  <!-- Icon mark -->
  <polygon points="28,22 64,22 82,52 64,82 28,82 10,52" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.4"/>
  <line x1="46" y1="30" x2="46" y2="74" stroke="url(#g2)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="46" y1="30" x2="20" y2="74" stroke="url(#g2)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="46" y1="30" x2="72" y2="74" stroke="url(#g2)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="30" y1="54" x2="62" y2="54" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="46" cy="30" r="3" fill="#d4b07a"/>
  <circle cx="20" cy="74" r="2.4" fill="#b8965a"/>
  <circle cx="72" cy="74" r="2.4" fill="#b8965a"/>
  <circle cx="30" cy="54" r="1.7" fill="#d4b07a" opacity="0.7"/>
  <circle cx="62" cy="54" r="1.7" fill="#d4b07a" opacity="0.7"/>
  <circle cx="46" cy="30" r="8" fill="none" stroke="#b8965a" stroke-width="0.7" opacity="0.35"/>

  <!-- Wordmark: "Audecy AI" — A caps, rest lowercase, AI caps, tight, no dot -->
  <text x="100" y="66"
    font-family="Raleway, 'Gill Sans', 'Century Gothic', sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="1.5"
    fill="#f5f2ec"
  >Audecy <tspan fill="url(#g1)" font-weight="800">AI</tspan></text>

  <line x1="100" y1="79" x2="372" y2="79" stroke="#b8965a" stroke-width="0.5" opacity="0.25"/>

  <text x="100" y="99"
    font-family="Raleway, 'Gill Sans', sans-serif"
    font-size="7.5"
    font-weight="400"
    letter-spacing="4"
    fill="#3e3a35"
  >INTELLIGENT SYSTEMS STUDIO</text>

  <text x="12" y="158" font-family="'Courier New', monospace" font-size="7.5" letter-spacing="3" fill="#2a2a2a">PRIMARY — DARK</text>


  <!-- ====================== -->
  <!-- PANEL 2: PRIMARY LIGHT -->
  <!-- ====================== -->
  <rect x="0" y="190" width="400" height="170" fill="#f0ece4" rx="4"/>

  <polygon points="28,212 64,212 82,242 64,272 28,272 10,242" fill="none" stroke="url(#g3)" stroke-width="1.2" opacity="0.5"/>
  <line x1="46" y1="220" x2="46" y2="264" stroke="url(#g3)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="46" y1="220" x2="20" y2="264" stroke="url(#g3)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="46" y1="220" x2="72" y2="264" stroke="url(#g3)" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="30" y1="244" x2="62" y2="244" stroke="url(#g3)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="46" cy="220" r="3" fill="#8a6e3a"/>
  <circle cx="20" cy="264" r="2.4" fill="#b8965a"/>
  <circle cx="72" cy="264" r="2.4" fill="#b8965a"/>
  <circle cx="30" cy="244" r="1.7" fill="#8a6e3a" opacity="0.7"/>
  <circle cx="62" cy="244" r="1.7" fill="#8a6e3a" opacity="0.7"/>
  <circle cx="46" cy="220" r="8" fill="none" stroke="#b8965a" stroke-width="0.7" opacity="0.4"/>

  <text x="100" y="256"
    font-family="Raleway, 'Gill Sans', 'Century Gothic', sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="1.5"
    fill="#0a0a0a"
  >Audecy <tspan fill="url(#g3)" font-weight="800">AI</tspan></text>

  <line x1="100" y1="269" x2="372" y2="269" stroke="#b8965a" stroke-width="0.5" opacity="0.3"/>

  <text x="100" y="289"
    font-family="Raleway, 'Gill Sans', sans-serif"
    font-size="7.5"
    font-weight="400"
    letter-spacing="4"
    fill="#9a8e7e"
  >INTELLIGENT SYSTEMS STUDIO</text>

  <text x="12" y="348" font-family="'Courier New', monospace" font-size="7.5" letter-spacing="3" fill="#bbb">PRIMARY — LIGHT</text>


  <!-- ======================== -->
  <!-- PANEL 3: COMPACT ONE-LINE -->
  <!-- ======================== -->
  <rect x="0" y="380" width="400" height="160" fill="#0a0a0a" rx="4"/>

  <polygon points="28,400 64,400 82,440 64,480 28,480 10,440" fill="none" stroke="url(#g1)" stroke-width="1.4" opacity="0.4"/>
  <line x1="46" y1="410" x2="46" y2="470" stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="410" x2="20" y2="470" stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="46" y1="410" x2="72" y2="470" stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="446" x2="62" y2="446" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="46" cy="410" r="3.5" fill="#d4b07a"/>
  <circle cx="20" cy="470" r="2.8" fill="#b8965a"/>
  <circle cx="72" cy="470" r="2.8" fill="#b8965a"/>
  <circle cx="30" cy="446" r="2" fill="#d4b07a" opacity="0.7"/>
  <circle cx="62" cy="446" r="2" fill="#d4b07a" opacity="0.7"/>
  <circle cx="46" cy="410" r="10" fill="none" stroke="#b8965a" stroke-width="0.8" opacity="0.35"/>

  <text x="100" y="449"
    font-family="Raleway, 'Gill Sans', 'Century Gothic', sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="1.5"
    fill="#f5f2ec"
  >Audecy <tspan fill="url(#g1)" font-weight="800">AI</tspan></text>

  <text x="12" y="528" font-family="'Courier New', monospace" font-size="7.5" letter-spacing="3" fill="#2a2a2a">COMPACT — ONE LINE</text>

</svg>
